apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/description: >
      Privileged containers have unrestricted host access.
      This policy blocks any container with privileged mode enabled,
      enforcing least-privilege as required by Zero Trust Architecture.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - zta-workloads
      validate:
        message: "Privileged containers are not allowed under Zero Trust policy"
        pattern:
          spec:
            containers:
              - name: "*"
                =(securityContext):
                  =(privileged): false

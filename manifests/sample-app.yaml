# Backend API deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: zta-workloads
  labels:
    app: backend-api
    tier: backend
    zta-monitored: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
        tier: backend
        zta-monitored: "true"
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from Backend API"
          ports:
            - containerPort: 5678
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
# Backend service
apiVersion: v1
kind: Service
metadata:
  name: backend-api-svc
  namespace: zta-workloads
spec:
  selector:
    app: backend-api
  ports:
    - port: 80
      targetPort: 5678
---
# Frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: zta-workloads
  labels:
    app: frontend-web
    tier: frontend
    zta-monitored: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
        tier: frontend
        zta-monitored: "true"
    spec:
      containers:
        - name: web
          image: nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
# Frontend service
apiVersion: v1
kind: Service
metadata:
  name: frontend-web-svc
  namespace: zta-workloads
spec:
  selector:
    app: frontend-web
  ports:
    - port: 80
      targetPort: 80
